{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>✏️ Edit User</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" value="{{ user.email }}" disabled readonly>
                            <small class="text-muted">Email cannot be changed.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select name="role" class="form-select">
                                <option value="assistant" {% if user.role == 'assistant' %}selected{% endif %}>Assistant</option>
                                <option value="accountant" {% if user.role == 'accountant' %}selected{% endif %}>Accountant</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Role</button>
                        <a href="{{ url_for('users.list_users') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
