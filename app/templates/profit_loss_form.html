{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <h2>📊 Profit & Loss Report</h2>
    <p class="text-muted">Generate a profit and loss statement for a date range.</p>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">From Date</label>
                <input type="date" name="from_date" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">To Date</label>
                <input type="date" name="to_date" class="form-control" required>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="include_details" id="includeDetails" value="yes">
                    <label class="form-check-label" for="includeDetails">
                        Include detailed lists (invoices and expenses)
                    </label>
                </div>
            </div>
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn btn-primary mt-3">Generate PDF</button>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>
{% endblock %}
