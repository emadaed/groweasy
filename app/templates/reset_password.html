{% extends "base.html" %}
{% block title %}Reset Password - GrowEasy Invoice{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">🔐 Set New Password</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        Enter and confirm your new password below.
                        This link expires after <strong>1 hour</strong>.
                    </p>

                    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">New Password</label>
                            <input type="password" name="new_password" class="form-control"
                                   required minlength="6"
                                   autocomplete="new-password"
                                   placeholder="Minimum 6 characters">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control"
                                   required minlength="6"
                                   autocomplete="new-password"
                                   placeholder="Repeat your new password">
                            <div id="passwordMismatch" class="invalid-feedback">
                                Passwords do not match.
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-success w-100">
                            Update Password
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{{ url_for('auth.login') }}" class="text-muted small">← Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script nonce="{{ nonce }}">
document.addEventListener('DOMContentLoaded', function () {
    const form = document.querySelector('form');
    const newPwd = document.querySelector('[name="new_password"]');
    const confirmPwd = document.querySelector('[name="confirm_password"]');
    const mismatch = document.getElementById('passwordMismatch');
    const submitBtn = document.getElementById('submitBtn');

    function checkMatch() {
        if (confirmPwd.value && newPwd.value !== confirmPwd.value) {
            confirmPwd.classList.add('is-invalid');
            mismatch.style.display = 'block';
            submitBtn.disabled = true;
        } else {
            confirmPwd.classList.remove('is-invalid');
            mismatch.style.display = 'none';
            submitBtn.disabled = false;
        }
    }

    newPwd.addEventListener('input', checkMatch);
    confirmPwd.addEventListener('input', checkMatch);

    form.addEventListener('submit', function (e) {
        if (newPwd.value !== confirmPwd.value) {
            e.preventDefault();
            checkMatch();
        }
    });
});
</script>
{% endblock %}
