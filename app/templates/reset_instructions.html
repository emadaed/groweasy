{% extends "base.html" %}

{% block title %}Reset Instructions - GrowEasy Invoice{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">📧 Check Your Email</h4>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="bi bi-envelope-check-fill text-success" style="font-size:3.5rem;"></i>
                        <h5>Password Reset Instructions Sent</h5>
                    </div>

                    <p class="text-muted">
                        We've sent password reset instructions to:<br>
                        <strong>{{ email }}</strong>
                    </p>

<!-- dev-mode note removed — email reset is now live -->

                    <div class="mt-4">
                        <a href="{{ url_for('auth.login') }}" class="btn btn-success">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
